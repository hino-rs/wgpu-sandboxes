name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Install Trunk
        run: |
          wget -qO- https://github.com/trunk-rs/trunk/releases/latest/download/trunk-x86_64-unknown-linux-gnu.tar.gz | tar -xzf-
          sudo mv trunk /usr/local/bin/

      - name: Build with Trunk
        run: |
          for project in lifegame wolfram_ca boids; do
            echo "::group::Building $project"
            cd "projects/$project"
            trunk build --release --public-url "/${{ github.event.repository.name }}/projects/$project/"
            cd ../..
            echo "::endgroup::"
          done

      - name: Prepare Deployment Directory
        run: |
          mkdir -p deploy_out
          cp index.html deploy_out/
          for project in lifegame wolfram_ca boids; do
            mkdir -p "deploy_out/projects/$project"
            cp -r "projects/$project/dist/"* "deploy_out/projects/$project/"
          done

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './deploy_out'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4